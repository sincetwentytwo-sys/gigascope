name: Daily Rebuild

# Rebuild daily at 06:00 UTC to refresh ISR cache and satellite metadata
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    paths:
      - "public/data/factories.json"

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            echo "VERCEL_DEPLOY_HOOK secret not set. Skipping."
            exit 0
          fi
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "Deploy triggered."
