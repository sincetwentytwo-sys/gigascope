name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      placeholder: "Describe the feature"
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
      placeholder: "How would this help users?"
