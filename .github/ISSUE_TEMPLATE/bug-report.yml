name: Bug Report
description: Report a bug or broken feature
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: "Describe the issue"
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page URL
      placeholder: "e.g. /factory/terafab"
  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - Desktop
        - Mobile
        - Tablet
